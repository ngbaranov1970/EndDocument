server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Проксируем API на бэкенд, срезая префикс /api:
    # /api/users/login -> http://backend:8000/users/login
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Долгий кэш для статики: у файлов Vite хэш в имени, они не меняются
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA-фолбэк: остальные пути отдают index.html (vue-router history mode)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
